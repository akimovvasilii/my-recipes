<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Culinary Journal</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d; --surface: #1a1917; --surface2: #242220;
  --text: #f0ede8; --text-muted: #8a8680; --accent: #c9a96e;
  --accent2: #8b6f47; --border: #2e2c29; --danger: #c0392b;
  --radius: 10px;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #faf8f5; --surface: #ffffff; --surface2: #f3f0eb;
  --text: #1a1814; --text-muted: #7a7570; --accent: #8b5e2a;
  --accent2: #c9a96e; --border: #e8e4de;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; transition: background var(--transition), color var(--transition); }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; padding: 32px;
}
#login-screen.hidden { display: none; }
.login-brand { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 300; font-style: italic; color: var(--accent); margin-bottom: 6px; }
.login-sub { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 48px; letter-spacing: 0.1em; text-transform: uppercase; }
.login-box { width: 100%; max-width: 320px; }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; }
header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; z-index: 100; }
.top-bar { display: flex; align-items: center; justify-content: space-between; height: 52px; }
.brand { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 300; font-style: italic; letter-spacing: 0.02em; color: var(--accent); }
.top-actions { display: flex; gap: 4px; align-items: center; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1rem; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background var(--transition), color var(--transition); }
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.lang-btn { font-family: var(--font-sans); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; transition: all var(--transition); }
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.search-bar { padding: 8px 0 10px; position: relative; }
.search-bar input { width: 100%; padding: 9px 16px 9px 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 30px; color: var(--text); font-family: var(--font-sans); font-size: 0.9rem; outline: none; transition: border-color var(--transition); }
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; }
.breadcrumbs { flex-shrink: 0; padding: 8px 16px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--surface); min-height: 36px; }
.crumb { cursor: pointer; transition: color var(--transition); }
.crumb:hover { color: var(--accent); }
.crumb.active { color: var(--text); font-weight: 500; pointer-events: none; }
.crumb-sep { opacity: 0.4; font-size: 0.7rem; }
#main-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 16px 16px 80px; }

/* VIEWS */
.view { display: none; animation: fadeUp 0.3s ease; }
.view.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.level-title { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 300; margin-bottom: 16px; color: var(--text); }
.section-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px; font-weight: 500; }

.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 8px; }
.cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; position: relative; min-height: 90px; display: flex; flex-direction: column; justify-content: flex-end; transition: border-color var(--transition), transform var(--transition); }
.cat-card:active { transform: scale(0.97); }
.cat-card:hover { border-color: var(--accent2); }
.cat-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.4s ease; }
.cat-card:hover .cat-card-bg { transform: scale(1.03); }
.cat-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 60%); }
.cat-card-body { position: relative; z-index: 2; padding: 10px 10px 8px; display: flex; align-items: center; gap: 8px; }
.cat-emoji { font-size: 1.4rem; flex-shrink: 0; }
.cat-name { font-weight: 500; font-size: 0.9rem; line-height: 1.3; color: var(--text); }
.cat-card[data-has-img="true"] .cat-name { color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
.cat-count { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
.cat-card[data-has-img="true"] .cat-count { color: rgba(255,255,255,0.7); }
.cat-actions { position: absolute; top: 6px; right: 6px; z-index: 3; display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }
.cat-card:hover .cat-actions { opacity: 1; }
.cat-actions button { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; }

.recipe-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color var(--transition), transform var(--transition); position: relative; }
.recipe-card:active { transform: scale(0.97); }
.recipe-card:hover { border-color: var(--accent2); }
.recipe-card-img { width: 100%; height: 100px; object-fit: cover; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-muted); }
.recipe-card-img img { width: 100%; height: 100%; object-fit: cover; }
.recipe-card-title { padding: 8px 10px 10px; font-size: 0.88rem; font-weight: 400; line-height: 1.35; }
.recipe-card-actions { position: absolute; top: 6px; right: 6px; z-index: 3; display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }
.recipe-card:hover .recipe-card-actions { opacity: 1; }
.recipe-card-actions button { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 0.7rem; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }

#view-recipe { padding-bottom: 20px; }
.recipe-hero-wrap { margin: -16px -16px 20px; height: 240px; overflow: hidden; }
.recipe-hero-wrap img { width: 100%; height: 100%; object-fit: cover; }
.recipe-hero-placeholder { width: 100%; height: 100%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
.recipe-title { font-family: var(--font-serif); font-size: 2rem; font-weight: 300; line-height: 1.2; margin-bottom: 20px; }
.recipe-section-title { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 500; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.ing-list { list-style: none; }
.ing-list li { padding: 8px 0 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.93rem; }
.steps-list { list-style: none; }
.steps-list li { padding: 10px 0 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.93rem; line-height: 1.6; }
.recipe-footer-img { margin-top: 20px; border-radius: var(--radius); width: 100%; object-fit: cover; max-height: 220px; }
.recipe-actions { display: flex; gap: 10px; margin-top: 24px; }

.form-title { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 300; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.form-control { width: 100%; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-sans); font-size: 0.95rem; outline: none; transition: border-color var(--transition); }
.form-control:focus { border-color: var(--accent); }
textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.5; }
select.form-control { appearance: none; cursor: pointer; }

.photo-upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: border-color var(--transition); position: relative; overflow: hidden; }
.photo-upload-area:hover { border-color: var(--accent); }
.photo-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: calc(var(--radius) - 2px); display: none; }
.photo-upload-icon { font-size: 2rem; margin-bottom: 6px; }
.photo-upload-text { font-size: 0.85rem; color: var(--text-muted); }

.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 8px; }
.emoji-btn { background: var(--surface2); border: 2px solid transparent; border-radius: 8px; padding: 6px; font-size: 1.3rem; cursor: pointer; text-align: center; transition: border-color var(--transition); }
.emoji-btn.selected { border-color: var(--accent); }

.btn { padding: 12px 20px; border: none; border-radius: var(--radius); font-family: var(--font-sans); font-size: 0.9rem; font-weight: 500; cursor: pointer; flex: 1; transition: all var(--transition); text-align: center; }
.btn-primary { background: var(--accent); color: #0f0e0d; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-group { display: flex; gap: 10px; margin-top: 20px; }

.fab-wrap { position: fixed; bottom: 20px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
.fab { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: transform var(--transition); }
.fab:active { transform: scale(0.93); }
.fab-primary { background: var(--accent); color: #0f0e0d; }
.fab-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 480px; border-top: 1px solid var(--border); animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 12px; }
.modal-text { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 30px; font-size: 0.85rem; z-index: 300; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.search-path { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.login-error { color: #c0392b; font-size: 0.85rem; margin-bottom: 12px; display: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

</div>

document.documentElement.setAttribute('data-theme', theme);
document.getElementById('btn-lang').textContent = lang === 'ru' ? 'EN' : 'RU';

// ── AUTH ──────────────────────────────────────────────────────
await setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    await loadAll();
    navTo('root');
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.style.display = 'block';
  }
};
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// ── DATA ──────────────────────────────────────────────────────
async function loadAll() {
  const [cSnap, rSnap] = await Promise.all([
    getDocs(collection(db, 'categories')),
    getDocs(collection(db, 'recipes'))
  ]);
  allCats    = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  allRecipes = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ── RENDER ────────────────────────────────────────────────────
function renderLevel() {
  renderBreadcrumbs();
  const cur = allCats.find(c => c.id === currentId);
  document.getElementById('level-title').textContent = currentId === 'root' ? T[lang].home : (cur?.name?.[lang] || cur?.name?.ru || '');

  const cats = allCats.filter(c => c.parentId === currentId);
  const catSec = document.getElementById('cats-section');
  catSec.innerHTML = '';
  if (cats.length) {
    const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = T[lang].categories; catSec.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'cat-grid';
    cats.forEach(c => grid.appendChild(makeCatCard(c))); catSec.appendChild(grid);
  }

  const recs = allRecipes.filter(r => r.parentId === currentId);
  const recSec = document.getElementById('recipes-section');
  recSec.innerHTML = '';
  if (recs.length) {
    const lbl = document.createElement('div'); lbl.className = 'section-label'; lbl.textContent = T[lang].recipes; recSec.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'recipe-grid';
    recs.forEach(r => grid.appendChild(makeRecipeCard(r))); recSec.appendChild(grid);
  }
  if (!cats.length && !recs.length) {
    recSec.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)"><div style="font-size:3rem;margin-bottom:12px">🍽</div><div>${T[lang].noRecipes}</div></div>`;
  }
  showView('view-browse');
  document.getElementById('fab-wrap').style.display = 'flex';
}

function makeCatCard(c) {
  const div = document.createElement('div'); div.className = 'cat-card';
  if (c.photoURL) { div.setAttribute('data-has-img','true'); div.innerHTML += `<div class="cat-card-bg" style="background-image:url('${c.photoURL}')"></div><div class="cat-card-overlay"></div>`; }
  const childCount = allCats.filter(x=>x.parentId===c.id).length + allRecipes.filter(x=>x.parentId===c.id).length;
  div.innerHTML += `<div class="cat-card-body"><span class="cat-emoji">${c.emoji||'📂'}</span><div><div class="cat-name">${c.name?.[lang]||c.name?.ru||''}</div><div class="cat-count">${childCount} ${lang==='ru'?'элем.':'items'}</div></div></div><div class="cat-actions"><button onclick="event.stopPropagation();openEditCat('${c.id}')">✏️</button><button onclick="event.stopPropagation();confirmDeleteCat('${c.id}')">🗑</button></div>`;
  div.onclick = () => navTo(c.id); return div;
}

function makeRecipeCard(r) {
  const div = document.createElement('div'); div.className = 'recipe-card';
  div.innerHTML = `${r.img1?`<div class="recipe-card-img"><img src="${r.img1}" loading="lazy"></div>`:`<div class="recipe-card-img">🍽</div>`}<div class="recipe-card-title">${r.name?.[lang]||r.name?.ru||''}</div><div class="recipe-card-actions"><button onclick="event.stopPropagation();openEditRec('${r.id}')">✏️</button><button onclick="event.stopPropagation();confirmDeleteRec('${r.id}')">🗑</button></div>`;
  div.onclick = () => openRecipe(r.id); return div;
}

function navTo(id) {
  currentId = id;
  if (navStack[navStack.length-1] !== id) navStack.push(id);
  renderLevel();
  document.getElementById('main-scroll').scrollTop = 0;
}

function renderBreadcrumbs() {
  const bc = document.getElementById('breadcrumbs'); bc.innerHTML = '';
  const chain = []; let cur = allCats.find(c => c.id === currentId);
  while (cur) { chain.unshift(cur); cur = allCats.find(c => c.id === cur.parentId); }
  const root = document.createElement('span'); root.className = 'crumb' + (currentId==='root'?' active':''); root.textContent = T[lang].home;
  root.onclick = () => { navStack=['root']; navTo('root'); }; bc.appendChild(root);
  chain.forEach((c, i) => {
    const sep = document.createElement('span'); sep.className='crumb-sep'; sep.textContent='›'; bc.appendChild(sep);
    const sp = document.createElement('span'); sp.className = 'crumb' + (i===chain.length-1?' active':''); sp.textContent = c.name?.[lang]||c.name?.ru||'';
    sp.onclick = () => { navStack = navStack.slice(0, navStack.indexOf(c.id)+1); navTo(c.id); }; bc.appendChild(sp);
  });
}

// ── RECIPE DETAIL ─────────────────────────────────────────────
function openRecipe(id) {
  const r = allRecipes.find(x=>x.id===id); if(!r) return;
  document.getElementById('rd-hero').innerHTML = r.img1 ? `<img src="${r.img1}" alt="">` : `<div class="recipe-hero-placeholder">🍽</div>`;
  document.getElementById('rd-title').textContent = r.name?.[lang]||r.name?.ru||'';
  document.getElementById('rd-lbl-ing').textContent = T[lang].ingredients;
  document.getElementById('rd-lbl-steps').textContent = T[lang].steps;
  const ingEl = document.getElementById('rd-ing'); ingEl.innerHTML = '';
  (r.ingredients?.[lang]||r.ingredients?.ru||'').split('\n').filter(Boolean).forEach(line=>{ const li=document.createElement('li'); li.textContent=line; ingEl.appendChild(li); });
  const stepsEl = document.getElementById('rd-steps'); stepsEl.innerHTML = '';
  (r.steps?.[lang]||r.steps?.ru||'').split('\n').filter(Boolean).forEach(line=>{ const li=document.createElement('li'); li.textContent=line; stepsEl.appendChild(li); });
  const footer = document.getElementById('rd-footer-img');
  footer.src = r.img2||''; footer.style.display = r.img2?'block':'none';
  document.getElementById('btn-edit-rec').onclick = () => openEditRec(id);
  document.getElementById('btn-delete-rec').onclick = () => confirmDeleteRec(id);
  showView('view-recipe'); document.getElementById('fab-wrap').style.display = 'none';
  document.getElementById('main-scroll').scrollTop = 0;
}

// ── CATEGORY FORM ─────────────────────────────────────────────
function buildEmojiGrid(sel) {
  const grid = document.getElementById('emoji-grid'); grid.innerHTML = '';
  EMOJIS.forEach(e => { const btn=document.createElement('button'); btn.className='emoji-btn'+(e===sel?' selected':''); btn.textContent=e; btn.onclick=()=>{ selectedEmoji=e; buildEmojiGrid(e); }; grid.appendChild(btn); });
}

function openNewCat() {
  document.getElementById('fcat-id').value=''; document.getElementById('fcat-name').value='';
  selectedEmoji='📂'; buildEmojiGrid(selectedEmoji);
  resetPhoto('fcat-photo','fcat-photo-preview','cat-upload-placeholder'); catPhotoFile=null;
  document.getElementById('form-cat-title').textContent=T[lang].newCategory;
  showView('view-form-cat'); document.getElementById('fab-wrap').style.display='none';
}

function openEditCat(id) {
  const c=allCats.find(x=>x.id===id); if(!c) return;
  document.getElementById('fcat-id').value=id; document.getElementById('fcat-name').value=c.name?.[lang]||c.name?.ru||'';
  selectedEmoji=c.emoji||'📂'; buildEmojiGrid(selectedEmoji);
  if(c.photoURL){ document.getElementById('fcat-photo-preview').src=c.photoURL; document.getElementById('fcat-photo-preview').style.display='block'; document.getElementById('cat-upload-placeholder').style.display='none'; }
  else resetPhoto('fcat-photo','fcat-photo-preview','cat-upload-placeholder');
  catPhotoFile=null; document.getElementById('form-cat-title').textContent=T[lang].editCategory;
  showView('view-form-cat'); document.getElementById('fab-wrap').style.display='none';
}

document.getElementById('fcat-photo').onchange = e => { const f=e.target.files[0]; if(!f) return; catPhotoFile=f; previewPhoto(f,'fcat-photo-preview','cat-upload-placeholder'); };
document.getElementById('fcat-save').onclick = async () => {
  const name=document.getElementById('fcat-name').value.trim(); if(!name) return;
  const id=document.getElementById('fcat-id').value||'cat_'+Date.now();
  showToast(T[lang].saving);
  let photoURL=allCats.find(c=>c.id===id)?.photoURL||'';
  if(catPhotoFile){ const r=ref(storage,`categories/${id}_${Date.now()}`); await uploadBytes(r,catPhotoFile); photoURL=await getDownloadURL(r); }
  const existing=allCats.find(c=>c.id===id);
  const data={ parentId:existing?.parentId||currentId, name:{...(existing?.name||{}),[lang]:name}, emoji:selectedEmoji, photoURL, updatedAt:Date.now() };
  if(!existing) data.createdAt=Date.now();
  await setDoc(doc(db,'categories',id),data,{merge:true});
  await loadAll(); showToast(T[lang].saved); navTo(data.parentId);
};
document.getElementById('fcat-cancel').onclick = () => navTo(currentId);

// ── RECIPE FORM ───────────────────────────────────────────────
function buildParentSelect(selId) {
  const sel=document.getElementById('frec-parent'); sel.innerHTML=`<option value="root">${T[lang].home}</option>`;
  function add(pid,depth){ allCats.filter(c=>c.parentId===pid).forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent='\u00a0'.repeat(depth*3)+(c.emoji||'📂')+' '+(c.name?.[lang]||c.name?.ru||''); if(c.id===selId) o.selected=true; sel.appendChild(o); add(c.id,depth+1); }); }
  add('root',0); if(selId) sel.value=selId;
}

function openNewRec() {
  document.getElementById('frec-id').value=''; document.getElementById('frec-name').value='';
  document.getElementById('frec-ing').value=''; document.getElementById('frec-steps').value='';
  buildParentSelect(currentId);
  resetPhoto('frec-photo1','frec-photo1-preview','rec-upload-placeholder1');
  resetPhoto('frec-photo2','frec-photo2-preview','rec-upload-placeholder2');
  rec1File=null; rec2File=null; document.getElementById('form-rec-title').textContent=T[lang].newRecipe;
  showView('view-form-rec'); document.getElementById('fab-wrap').style.display='none';
}

function openEditRec(id) {
  const r=allRecipes.find(x=>x.id===id); if(!r) return;
  document.getElementById('frec-id').value=id; document.getElementById('frec-name').value=r.name?.[lang]||r.name?.ru||'';
  document.getElementById('frec-ing').value=r.ingredients?.[lang]||r.ingredients?.ru||'';
  document.getElementById('frec-steps').value=r.steps?.[lang]||r.steps?.ru||'';
  buildParentSelect(r.parentId);
  if(r.img1){ document.getElementById('frec-photo1-preview').src=r.img1; document.getElementById('frec-photo1-preview').style.display='block'; document.getElementById('rec-upload-placeholder1').style.display='none'; } else resetPhoto('frec-photo1','frec-photo1-preview','rec-upload-placeholder1');
  if(r.img2){ document.getElementById('frec-photo2-preview').src=r.img2; document.getElementById('frec-photo2-preview').style.display='block'; document.getElementById('rec-upload-placeholder2').style.display='none'; } else resetPhoto('frec-photo2','frec-photo2-preview','rec-upload-placeholder2');
  rec1File=null; rec2File=null; document.getElementById('form-rec-title').textContent=T[lang].editRecipe;
  showView('view-form-rec'); document.getElementById('fab-wrap').style.display='none';
}

document.getElementById('frec-photo1').onchange = e => { const f=e.target.files[0]; if(!f) return; rec1File=f; previewPhoto(f,'frec-photo1-preview','rec-upload-placeholder1'); };
document.getElementById('frec-photo2').onchange = e => { const f=e.target.files[0]; if(!f) return; rec2File=f; previewPhoto(f,'frec-photo2-preview','rec-upload-placeholder2'); };

document.getElementById('frec-save').onclick = async () => {
  const name=document.getElementById('frec-name').value.trim(); if(!name) return;
  const id=document.getElementById('frec-id').value||'rec_'+Date.now();
  const parentId=document.getElementById('frec-parent').value;
  showToast(T[lang].saving);
  const existing=allRecipes.find(r=>r.id===id);
  let img1=existing?.img1||'', img2=existing?.img2||'';
  if(rec1File){ const r=ref(storage,`recipes/${id}_1_${Date.now()}`); await uploadBytes(r,rec1File); img1=await getDownloadURL(r); }
  if(rec2File){ const r=ref(storage,`recipes/${id}_2_${Date.now()}`); await uploadBytes(r,rec2File); img2=await getDownloadURL(r); }
  const data={ parentId, name:{...(existing?.name||{}),[lang]:name}, ingredients:{...(existing?.ingredients||{}),[lang]:document.getElementById('frec-ing').value}, steps:{...(existing?.steps||{}),[lang]:document.getElementById('frec-steps').value}, img1, img2, updatedAt:Date.now() };
  if(!existing) data.createdAt=Date.now();
  await setDoc(doc(db,'recipes',id),data,{merge:true});
  await loadAll(); showToast(T[lang].saved); navTo(parentId);
};
document.getElementById('frec-cancel').onclick = () => navTo(currentId);

// ── DELETE ────────────────────────────────────────────────────
function confirmDeleteCat(id) {
  const hasChildren=allCats.some(c=>c.parentId===id)||allRecipes.some(r=>r.parentId===id);
  document.getElementById('modal-title').textContent=T[lang].confirmDeleteCat;
  document.getElementById('modal-text').textContent=hasChildren?T[lang].warnHasChildren:'';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick=async()=>{ document.getElementById('modal-overlay').classList.remove('open'); await deleteCatRecursive(id); await loadAll(); showToast(T[lang].deleted); renderLevel(); };
}
async function deleteCatRecursive(id) {
  for(const c of allCats.filter(x=>x.parentId===id)) await deleteCatRecursive(c.id);
  for(const r of allRecipes.filter(x=>x.parentId===id)) await deleteDoc(doc(db,'recipes',r.id));
  await deleteDoc(doc(db,'categories',id));
}
function confirmDeleteRec(id) {
  document.getElementById('modal-title').textContent=T[lang].confirmDeleteRec;
  document.getElementById('modal-text').textContent='';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick=async()=>{ document.getElementById('modal-overlay').classList.remove('open'); await deleteDoc(doc(db,'recipes',id)); await loadAll(); showToast(T[lang].deleted); navTo(currentId); };
}
document.getElementById('modal-cancel').onclick=()=>document.getElementById('modal-overlay').classList.remove('open');
document.getElementById('modal-overlay').onclick=e=>{ if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); };

// ── SEARCH ────────────────────────────────────────────────────
document.getElementById('search-input').oninput = e => {
  const q=e.target.value.toLowerCase().trim(); if(!q){ renderLevel(); return; }
  document.getElementById('cats-section').innerHTML=''; document.getElementById('level-title').textContent=T[lang].searchResults;
  const results=allRecipes.filter(r=>(r.name?.[lang]||r.name?.ru||'').toLowerCase().includes(q)||(r.ingredients?.[lang]||r.ingredients?.ru||'').toLowerCase().includes(q));
  const recSec=document.getElementById('recipes-section'); recSec.innerHTML='';
  if(!results.length){ recSec.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-muted)"><div style="font-size:3rem">🔍</div><div>${T[lang].noResults}</div></div>`; return; }
  const grid=document.createElement('div'); grid.className='recipe-grid';
  results.forEach(r=>{ const card=makeRecipeCard(r); const path=getPath(r.parentId); if(path){const p=document.createElement('div');p.className='search-path';p.textContent=path;card.querySelector('.recipe-card-title').appendChild(p);} grid.appendChild(card); });
  recSec.appendChild(grid); showView('view-browse');
};
function getPath(pid){ const chain=[]; let c=allCats.find(x=>x.id===pid); while(c){chain.unshift(c.name?.[lang]||c.name?.ru||'');c=allCats.find(x=>x.id===c.parentId);} return chain.join(' › '); }

// ── THEME / LANG ──────────────────────────────────────────────
document.getElementById('btn-theme').onclick=()=>{ theme=theme==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',theme); localStorage.setItem('theme',theme); };
document.getElementById('btn-lang').onclick=()=>{ lang=lang==='ru'?'en':'ru'; localStorage.setItem('lang',lang); document.getElementById('btn-lang').textContent=lang==='ru'?'EN':'RU'; document.getElementById('search-input').placeholder=T[lang].search; renderLevel(); };

// ── FAB ───────────────────────────────────────────────────────
document.getElementById('fab-cat').onclick=openNewCat;
document.getElementById('fab-rec').onclick=openNewRec;

// ── HELPERS ───────────────────────────────────────────────────
function showView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='view-browse') document.getElementById('fab-wrap').style.display='flex'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function previewPhoto(file,prevId,phId){ const rd=new FileReader(); rd.onload=e=>{ const p=document.getElementById(prevId); p.src=e.target.result; p.style.display='block'; document.getElementById(phId).style.display='none'; }; rd.readAsDataURL(file); }
function resetPhoto(inpId,prevId,phId){ const p=document.getElementById(prevId); p.src=''; p.style.display='none'; document.getElementById(phId).style.display='block'; document.getElementById(inpId).value=''; }

window.openEditCat=openEditCat; window.confirmDeleteCat=confirmDeleteCat;
window.openEditRec=openEditRec; window.confirmDeleteRec=confirmDeleteRec;
window.navTo=navTo;
</script>
</body>
</html>

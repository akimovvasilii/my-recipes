<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Culinary Journal</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #242220;
  --text: #f0ede8;
  --text-muted: #8a8680;
  --accent: #c9a96e;
  --accent2: #8b6f47;
  --border: #2e2c29;
  --danger: #c0392b;
  --radius: 10px;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #faf8f5;
  --surface: #ffffff;
  --surface2: #f3f0eb;
  --text: #1a1814;
  --text-muted: #7a7570;
  --accent: #8b5e2a;
  --accent2: #c9a96e;
  --border: #e8e4de;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
}

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; }
header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  z-index: 100;
}
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.brand {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.02em;
  color: var(--accent);
}
.top-actions { display: flex; gap: 4px; align-items: center; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 1rem;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.icon-btn:hover, .icon-btn:active { background: var(--surface2); color: var(--text); }
.lang-btn {
  font-family: var(--font-sans); font-size: 0.75rem; font-weight: 500;
  letter-spacing: 0.08em; color: var(--text-muted);
  background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; cursor: pointer;
  transition: all var(--transition);
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

.search-bar {
  padding: 8px 0 10px;
  position: relative;
}
.search-bar input {
  width: 100%; padding: 9px 16px 9px 36px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 30px; color: var(--text);
  font-family: var(--font-sans); font-size: 0.9rem;
  outline: none; transition: border-color var(--transition);
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 0.85rem; pointer-events: none;
}

.breadcrumbs {
  flex-shrink: 0;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
  font-size: 0.8rem; color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  min-height: 36px;
}
.crumb { cursor: pointer; transition: color var(--transition); }
.crumb:hover { color: var(--accent); }
.crumb.active { color: var(--text); font-weight: 500; pointer-events: none; }
.crumb-sep { opacity: 0.4; font-size: 0.7rem; }

#main-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 80px;
}

/* VIEWS */
.view { display: none; animation: fadeUp 0.3s ease; }
.view.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CATEGORY / BROWSE */
.level-title {
  font-family: var(--font-serif);
  font-size: 1.8rem; font-weight: 300;
  margin-bottom: 16px; color: var(--text);
  letter-spacing: 0.01em;
}
.section-label {
  font-size: 0.7rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
  margin: 20px 0 10px; font-weight: 500;
}

/* SUBCATEGORY GRID */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 8px;
}
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer; position: relative;
  min-height: 90px;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  transition: border-color var(--transition), transform var(--transition);
}
.cat-card:active { transform: scale(0.97); }
.cat-card:hover { border-color: var(--accent2); }
.cat-card-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.4s ease;
}
.cat-card:hover .cat-card-bg { transform: scale(1.03); }
.cat-card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 60%);
}
.cat-card-body {
  position: relative; z-index: 2;
  padding: 10px 10px 8px;
  display: flex; align-items: center; gap: 8px;
}
.cat-emoji { font-size: 1.4rem; flex-shrink: 0; }
.cat-name {
  font-weight: 500; font-size: 0.9rem; line-height: 1.3;
  color: var(--text);
}
.cat-card[data-has-img="true"] .cat-name { color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
.cat-count {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 1px;
}
.cat-card[data-has-img="true"] .cat-count { color: rgba(255,255,255,0.7); }
.cat-actions {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition);
}
.cat-card:hover .cat-actions { opacity: 1; }
.cat-actions button {
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  border: none; border-radius: 50%;
  width: 26px; height: 26px; font-size: 0.7rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; transition: background var(--transition);
}
.cat-actions button:hover { background: rgba(0,0,0,0.8); }

/* RECIPE GRID */
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.recipe-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: border-color var(--transition), transform var(--transition);
  position: relative;
}
.recipe-card:active { transform: scale(0.97); }
.recipe-card:hover { border-color: var(--accent2); }
.recipe-card-img {
  width: 100%; height: 100px; object-fit: cover;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; color: var(--text-muted);
}
.recipe-card-img img { width: 100%; height: 100%; object-fit: cover; }
.recipe-card-title {
  padding: 8px 10px 10px;
  font-size: 0.88rem; font-weight: 400; line-height: 1.35;
}
.recipe-card-actions {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition);
}
.recipe-card:hover .recipe-card-actions { opacity: 1; }
.recipe-card-actions button {
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  border: none; border-radius: 50%;
  width: 26px; height: 26px; font-size: 0.7rem;
  cursor: pointer; color: #fff;
  display: flex; align-items: center; justify-content: center;
}

/* RECIPE DETAIL */
#view-recipe { padding-bottom: 20px; }
.recipe-hero-wrap {
  margin: -16px -16px 20px;
  height: 240px; overflow: hidden; position: relative;
}
.recipe-hero-wrap img {
  width: 100%; height: 100%; object-fit: cover;
}
.recipe-hero-placeholder {
  width: 100%; height: 100%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem;
}
.recipe-title {
  font-family: var(--font-serif);
  font-size: 2rem; font-weight: 300;
  line-height: 1.2; margin-bottom: 20px;
  letter-spacing: 0.01em;
}
.recipe-section-title {
  font-size: 0.7rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
  font-weight: 500; margin: 24px 0 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.ing-list { list-style: none; }
.ing-list li {
  padding: 8px 0 8px 12px; border-bottom: 1px solid var(--border);
  font-size: 0.93rem;
}
.steps-list { list-style: none; }
.steps-list li {
  padding: 10px 0 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.93rem; line-height: 1.6;
}
.recipe-footer-img {
  margin-top: 20px; border-radius: var(--radius);
  width: 100%; object-fit: cover; max-height: 220px;
}
.recipe-actions { display: flex; gap: 10px; margin-top: 24px; }

/* FORMS */
.form-title {
  font-family: var(--font-serif);
  font-size: 1.6rem; font-weight: 300;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px; font-weight: 500;
}
.form-control {
  width: 100%; padding: 11px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text); font-family: var(--font-sans);
  font-size: 0.95rem; outline: none;
  transition: border-color var(--transition);
}
.form-control:focus { border-color: var(--accent); }
textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.5; }
select.form-control { appearance: none; cursor: pointer; }

/* PHOTO UPLOAD */
.photo-upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px; text-align: center;
  cursor: pointer; transition: border-color var(--transition), background var(--transition);
  position: relative; overflow: hidden;
}
.photo-upload-area:hover { border-color: var(--accent); background: var(--surface2); }
.photo-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.photo-preview {
  width: 100%; max-height: 200px; object-fit: cover;
  border-radius: calc(var(--radius) - 2px);
  display: none;
}
.photo-upload-icon { font-size: 2rem; margin-bottom: 6px; }
.photo-upload-text { font-size: 0.85rem; color: var(--text-muted); }

/* EMOJI PICKER */
.emoji-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-top: 8px;
}
.emoji-btn {
  background: var(--surface2); border: 2px solid transparent;
  border-radius: 8px; padding: 6px; font-size: 1.3rem;
  cursor: pointer; text-align: center;
  transition: border-color var(--transition), background var(--transition);
}
.emoji-btn:hover { background: var(--surface); border-color: var(--border); }
.emoji-btn.selected { border-color: var(--accent); background: var(--surface); }

/* BUTTONS */
.btn {
  padding: 12px 20px; border: none; border-radius: var(--radius);
  font-family: var(--font-sans); font-size: 0.9rem;
  font-weight: 500; cursor: pointer; flex: 1;
  transition: all var(--transition); text-align: center;
  letter-spacing: 0.02em;
}
.btn-primary { background: var(--accent); color: #0f0e0d; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--text-muted); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-group { display: flex; gap: 10px; margin-top: 20px; }

/* FAB */
.fab-wrap {
  position: fixed; bottom: 20px; right: 16px;
  display: flex; flex-direction: column; gap: 10px; z-index: 50;
}
.fab {
  width: 48px; height: 48px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: transform var(--transition), box-shadow var(--transition);
}
.fab:active { transform: scale(0.93); }
.fab-primary { background: var(--accent); color: #0f0e0d; }
.fab-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.fab-label {
  position: absolute; right: 56px; white-space: nowrap;
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.78rem; color: var(--text-muted);
  pointer-events: none;
}

/* LOADING */
.loader {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--text-muted); gap: 10px;
}
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* EMPTY STATE */
.empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-text { font-size: 0.9rem; line-height: 1.5; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px; width: 100%; max-width: 480px;
  border-top: 1px solid var(--border);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 12px; }
.modal-text { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 18px; border-radius: 30px;
  font-size: 0.85rem; z-index: 300; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SEARCH RESULTS */
.search-path { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app" style="visibility:hidden">
  <header>
    <div class="top-bar">
      <div class="brand">Journal.</div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-theme" title="Тема">🌓</button>
        <button class="lang-btn" id="btn-lang">EN</button>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Поиск рецептов...">
    </div>
  </header>
  <div class="breadcrumbs" id="breadcrumbs"></div>
  <div id="main-scroll">

    <!-- BROWSE -->
    <div class="view active" id="view-browse">
      <div class="level-title" id="level-title"></div>
      <div id="cats-section"></div>
      <div id="recipes-section"></div>
    </div>

    <!-- RECIPE DETAIL -->
    <div class="view" id="view-recipe">
      <div class="recipe-hero-wrap" id="rd-hero"></div>
      <div class="recipe-title" id="rd-title"></div>
      <div class="recipe-section-title" id="rd-lbl-ing">Ингредиенты</div>
      <ul class="ing-list" id="rd-ing"></ul>
      <div class="recipe-section-title" id="rd-lbl-steps">Шаги</div>
      <ol class="steps-list" id="rd-steps"></ol>
      <img id="rd-footer-img" class="recipe-footer-img" style="display:none">
      <div class="recipe-actions">
        <button class="btn btn-secondary" id="btn-edit-rec">✏️ <span data-key="edit">Редактировать</span></button>
        <button class="btn btn-danger" id="btn-delete-rec">🗑 <span data-key="delete">Удалить</span></button>
      </div>
    </div>

    <!-- FORM: CATEGORY -->
    <div class="view" id="view-form-cat">
      <div class="form-title" id="form-cat-title">Категория</div>
      <input type="hidden" id="fcat-id">
      <div class="form-group">
        <label class="form-label" data-key="name">Название</label>
        <input type="text" class="form-control" id="fcat-name" placeholder="Например: Супы">
      </div>
      <div class="form-group">
        <label class="form-label" data-key="icon">Иконка</label>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
      <div class="form-group">
        <label class="form-label" data-key="coverPhoto">Обложка (необязательно)</label>
        <div class="photo-upload-area" id="cat-photo-area">
          <input type="file" accept="image/*" id="fcat-photo">
          <img class="photo-preview" id="fcat-photo-preview">
          <div id="cat-upload-placeholder">
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-text" data-key="tapToUpload">Нажмите чтобы загрузить фото</div>
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="fcat-cancel" data-key="cancel">Отмена</button>
        <button class="btn btn-primary" id="fcat-save" data-key="save">Сохранить</button>
      </div>
    </div>

    <!-- FORM: RECIPE -->
    <div class="view" id="view-form-rec">
      <div class="form-title" id="form-rec-title">Рецепт</div>
      <input type="hidden" id="frec-id">
      <div class="form-group">
        <label class="form-label" data-key="name">Название</label>
        <input type="text" class="form-control" id="frec-name" placeholder="Название рецепта">
      </div>
      <div class="form-group">
        <label class="form-label" data-key="category">Категория</label>
        <select class="form-control" id="frec-parent"></select>
      </div>
      <div class="form-group">
        <label class="form-label" data-key="ingredients">Ингредиенты</label>
        <textarea class="form-control" id="frec-ing" rows="5" placeholder="Каждый ингредиент с новой строки"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" data-key="steps">Шаги</label>
        <textarea class="form-control" id="frec-steps" rows="6" placeholder="Каждый шаг с новой строки"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" data-key="mainPhoto">Главное фото</label>
        <div class="photo-upload-area">
          <input type="file" accept="image/*" id="frec-photo1">
          <img class="photo-preview" id="frec-photo1-preview">
          <div id="rec-upload-placeholder1">
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-text" data-key="tapToUpload">Нажмите чтобы загрузить фото</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-key="extraPhoto">Дополнительное фото</label>
        <div class="photo-upload-area">
          <input type="file" accept="image/*" id="frec-photo2">
          <img class="photo-preview" id="frec-photo2-preview">
          <div id="rec-upload-placeholder2">
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-text" data-key="tapToUpload">Нажмите чтобы загрузить фото</div>
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="frec-cancel" data-key="cancel">Отмена</button>
        <button class="btn btn-primary" id="frec-save" data-key="save">Сохранить</button>
      </div>
    </div>

  </div><!-- /main-scroll -->

  <!-- FAB -->
  <div class="fab-wrap" id="fab-wrap">
    <div style="position:relative">
      <button class="fab fab-secondary" id="fab-cat" title="Добавить категорию">📂</button>
    </div>
    <div style="position:relative">
      <button class="fab fab-primary" id="fab-rec" title="Добавить рецепт">🍽</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="btn-group">
      <button class="btn btn-secondary" id="modal-cancel" data-key="cancel">Отмена</button>

// ── I18N ─────────────────────────────────────────────────────

// ── STATE ────────────────────────────────────────────────────
let lang = localStorage.getItem('lang') || 'ru';
let theme = localStorage.getItem('theme') || 'dark';
let currentId = 'root';
let navStack = ['root'];
let allCats = [];
let allRecipes = [];
let selectedEmoji = '📂';
let catPhotoFile = null, rec1File = null, rec2File = null;
let editingRecipeId = null;

// ── EMOJIS ──────────────────────────────────────────────────
const EMOJIS = ['🥗','🍝','🍲','🥘','🍜','🍛','🍣','🥩','🍗','🥚','🥞','🥖','🍰','🎂','🍪','🧁','🍫','🍷','🍹','🥗','🫕','🫔','🌮','🥙','🥪','🫙','🧆','🥜','🌿','🧄','🫚','🍳','🥣','🫖','☕','📂'];

// ── INIT ─────────────────────────────────────────────────────
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('btn-lang').textContent = lang === 'ru' ? 'EN' : 'RU';

async function loadAll() {
  const [cSnap, rSnap] = await Promise.all([
    getDocs(collection(db, 'categories')),
    getDocs(collection(db, 'recipes'))
  ]);
  allCats = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  allRecipes = rSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderLevel();
}

// ── AUTH ─────────────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen');
loginScreen.style.display = 'flex';

await setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, async user => {
  if (user) {
    loginScreen.style.display = 'none';
    document.getElementById('app').style.visibility = 'visible';
    await loadAll();
    navTo('root');
  } else {
    loginScreen.style.display = 'flex';
    document.getElementById('app').style.visibility = 'hidden';
  }
});

document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = 'Неверный email или пароль';
    errEl.style.display = 'block';
  }
};

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// ── RENDER LEVEL ─────────────────────────────────────────────
function renderLevel() {
  renderBreadcrumbs();
  const cur = allCats.find(c => c.id === currentId);
  const t = T[lang];
  document.getElementById('level-title').textContent =
    currentId === 'root' ? t.home : (cur?.name?.[lang] || cur?.name?.ru || '');

  // subcats
  const cats = allCats.filter(c => c.parentId === currentId);
  const catSec = document.getElementById('cats-section');
  catSec.innerHTML = '';
  if (cats.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = t.categories;
    catSec.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'cat-grid';
    cats.forEach(c => grid.appendChild(makeCatCard(c)));
    catSec.appendChild(grid);
  }

  // recipes
  const recs = allRecipes.filter(r => r.parentId === currentId);
  const recSec = document.getElementById('recipes-section');
  recSec.innerHTML = '';
  if (recs.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = t.recipes;
    recSec.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'recipe-grid';
    recs.forEach(r => grid.appendChild(makeRecipeCard(r)));
    recSec.appendChild(grid);
  }
  if (!cats.length && !recs.length) {
    recSec.innerHTML = `<div class="empty"><div class="empty-icon">🍽</div><div class="empty-text">${t.noRecipes}</div></div>`;
  }
  showView('view-browse');
  document.getElementById('fab-wrap').style.display = 'flex';
}

function makeCatCard(c) {
  const div = document.createElement('div');
  div.className = 'cat-card';
  const hasImg = !!c.photoURL;
  if (hasImg) div.setAttribute('data-has-img','true');
  if (hasImg) div.innerHTML += `<div class="cat-card-bg" style="background-image:url('${c.photoURL}')"></div><div class="cat-card-overlay"></div>`;
  const childCount = allCats.filter(x=>x.parentId===c.id).length + allRecipes.filter(x=>x.parentId===c.id).length;
  div.innerHTML += `
    <div class="cat-card-body">
      <span class="cat-emoji">${c.emoji||'📂'}</span>
      <div>
        <div class="cat-name">${c.name?.[lang]||c.name?.ru||''}</div>
        <div class="cat-count">${childCount} ${lang==='ru'?'элем.':'items'}</div>
      </div>
    </div>
    <div class="cat-actions">
      <button onclick="event.stopPropagation();openEditCat('${c.id}')">✏️</button>
      <button onclick="event.stopPropagation();confirmDeleteCat('${c.id}')">🗑</button>
    </div>`;
  div.onclick = () => navTo(c.id);
  return div;
}

function makeRecipeCard(r) {
  const div = document.createElement('div');
  div.className = 'recipe-card';
  const imgHtml = r.img1
    ? `<div class="recipe-card-img"><img src="${r.img1}" loading="lazy"></div>`
    : `<div class="recipe-card-img">🍽</div>`;
  div.innerHTML = `${imgHtml}
    <div class="recipe-card-title">${r.name?.[lang]||r.name?.ru||''}</div>
    <div class="recipe-card-actions">
      <button onclick="event.stopPropagation();openEditRec('${r.id}')">✏️</button>
      <button onclick="event.stopPropagation();confirmDeleteRec('${r.id}')">🗑</button>
    </div>`;
  div.onclick = () => openRecipe(r.id);
  return div;
}

// ── NAVIGATION ───────────────────────────────────────────────
function navTo(id) {
  currentId = id;
  if (navStack[navStack.length-1] !== id) navStack.push(id);
  renderLevel();
  document.getElementById('main-scroll').scrollTop = 0;
}

function navBack() {
  if (navStack.length > 1) {
    navStack.pop();
    currentId = navStack[navStack.length-1];
    renderLevel();
  }
}

function renderBreadcrumbs() {
  const bc = document.getElementById('breadcrumbs');
  bc.innerHTML = '';
  const chain = [];
  let cur = allCats.find(c => c.id === currentId);
  while (cur) { chain.unshift(cur); cur = allCats.find(c => c.id === cur.parentId); }

  const root = document.createElement('span');
  root.className = 'crumb' + (currentId==='root'?' active':'');
  root.textContent = T[lang].home;
  root.onclick = () => { navStack=['root']; navTo('root'); };
  bc.appendChild(root);

  chain.forEach((c, i) => {
    const sep = document.createElement('span'); sep.className='crumb-sep'; sep.textContent='›';
    bc.appendChild(sep);
    const sp = document.createElement('span');
    sp.className = 'crumb' + (i===chain.length-1?' active':'');
    sp.textContent = c.name?.[lang]||c.name?.ru||'';
    sp.onclick = () => {
      navStack = navStack.slice(0, navStack.indexOf(c.id)+1);
      navTo(c.id);
    };
    bc.appendChild(sp);
  });
}

// ── RECIPE DETAIL ────────────────────────────────────────────
function openRecipe(id) {
  const r = allRecipes.find(x=>x.id===id); if(!r) return;
  editingRecipeId = id;
  const t = T[lang];

  const hero = document.getElementById('rd-hero');
  hero.innerHTML = r.img1
    ? `<img src="${r.img1}" alt="">`
    : `<div class="recipe-hero-placeholder">🍽</div>`;

  document.getElementById('rd-title').textContent = r.name?.[lang]||r.name?.ru||'';
  document.getElementById('rd-lbl-ing').textContent = t.ingredients;
  document.getElementById('rd-lbl-steps').textContent = t.steps;

  const ingEl = document.getElementById('rd-ing');
  ingEl.innerHTML = '';
  (r.ingredients?.[lang]||r.ingredients?.ru||'').split('\n').filter(Boolean).forEach(line=>{
    const li=document.createElement('li'); li.textContent=line; ingEl.appendChild(li);
  });

  const stepsEl = document.getElementById('rd-steps');
  stepsEl.innerHTML = '';
  (r.steps?.[lang]||r.steps?.ru||'').split('\n').filter(Boolean).forEach(line=>{
    const li=document.createElement('li'); li.textContent=line; stepsEl.appendChild(li);
  });

  const footer = document.getElementById('rd-footer-img');
  if (r.img2) { footer.src=r.img2; footer.style.display='block'; }
  else { footer.style.display='none'; }

  document.getElementById('btn-edit-rec').onclick = () => openEditRec(id);
  document.getElementById('btn-delete-rec').onclick = () => confirmDeleteRec(id);

  showView('view-recipe');
  document.getElementById('fab-wrap').style.display = 'none';
  document.getElementById('main-scroll').scrollTop = 0;
}

// ── CATEGORY FORM ────────────────────────────────────────────
function buildEmojiGrid(selected) {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e===selected?' selected':'');

    btn.onclick = () => { selectedEmoji=e; buildEmojiGrid(e); };
    grid.appendChild(btn);

}

function openNewCat() {
  document.getElementById('fcat-id').value = '';
  document.getElementById('fcat-name').value = '';
  selectedEmoji = '📂';
  buildEmojiGrid(selectedEmoji);
  resetPhotoArea('fcat-photo', 'fcat-photo-preview', 'cat-upload-placeholder');

  document.getElementById('fab-wrap').style.display = 'none';
}

function openEditCat(id) {
  const c = allCats.find(x=>x.id===id); if(!c) return;
  document.getElementById('fcat-id').value = id;
  document.getElementById('fcat-name').value = c.name?.[lang]||c.name?.ru||'';
  selectedEmoji = c.emoji || '📂';

  if (c.photoURL) {
    document.getElementById('fcat-photo-preview').src = c.photoURL;
    document.getElementById('fcat-photo-preview').style.display = 'block';
    document.getElementById('cat-upload-placeholder').style.display = 'none';
  } else {
    resetPhotoArea('fcat-photo', 'fcat-photo-preview', 'cat-upload-placeholder');
  }
  catPhotoFile = null;
  document.getElementById('form-cat-title').textContent = T[lang].editCategory;
  showView('view-form-cat');
  document.getElementById('fab-wrap').style.display = 'none';
}

document.getElementById('fcat-photo').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  catPhotoFile = file;
  showPhotoPreview(file, 'fcat-photo-preview', 'cat-upload-placeholder');
};

document.getElementById('fcat-save').onclick = async () => {
  const name = document.getElementById('fcat-name').value.trim();
  if (!name) { showToast('⚠ ' + T[lang].name); return; }
  const id = document.getElementById('fcat-id').value || 'cat_' + Date.now();
  showToast(T[lang].saving);

  let photoURL = allCats.find(c=>c.id===id)?.photoURL || '';
  if (catPhotoFile) {
    const storRef = ref(storage, `categories/${id}_${Date.now()}`);
    await uploadBytes(storRef, catPhotoFile);
    photoURL = await getDownloadURL(storRef);
  }

  const existing = allCats.find(c=>c.id===id);
  const data = {
    parentId: existing?.parentId || currentId,
    name: { ...(existing?.name||{}), [lang]: name },
    emoji: selectedEmoji,
    photoURL,
    updatedAt: Date.now()
  };
  if (!existing) data.createdAt = Date.now();
  await setDoc(doc(db,'categories',id), data, {merge:true});
  await loadAll();
  showToast(T[lang].saved);
  navTo(data.parentId);
};

document.getElementById('fcat-cancel').onclick = () => { navTo(currentId); };

// ── RECIPE FORM ──────────────────────────────────────────────
function buildParentSelect(selectedId) {
  const sel = document.getElementById('frec-parent');
  sel.innerHTML = `<option value="root">${T[lang].home}</option>`;
  function addOptions(parentId, depth) {
    allCats.filter(c=>c.parentId===parentId).forEach(c=>{
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = '\u00a0'.repeat(depth*3) + (c.emoji||'📂') + ' ' + (c.name?.[lang]||c.name?.ru||'');
      if (c.id === selectedId) opt.selected = true;
      sel.appendChild(opt);
      addOptions(c.id, depth+1);
    });
  }
  addOptions('root', 0);
  if (selectedId) sel.value = selectedId;
}

function openNewRec() {
  document.getElementById('frec-id').value = '';
  document.getElementById('frec-name').value = '';
  document.getElementById('frec-ing').value = '';
  document.getElementById('frec-steps').value = '';
  buildParentSelect(currentId);
  resetPhotoArea('frec-photo1','frec-photo1-preview','rec-upload-placeholder1');

  else resetPhotoArea('frec-photo2','frec-photo2-preview','rec-upload-placeholder2');
  rec1File = null; rec2File = null;
  document.getElementById('form-rec-title').textContent = T[lang].editRecipe;

  document.getElementById('fab-wrap').style.display = 'none';

document.getElementById('frec-photo1').onchange = e => {
  const f=e.target.files[0]; if(!f) return; rec1File=f;

};
document.getElementById('frec-photo2').onchange = e => {
  const f=e.target.files[0]; if(!f) return; rec2File=f;
  showPhotoPreview(f,'frec-photo2-preview','rec-upload-placeholder2');
};

document.getElementById('frec-save').onclick = async () => {
  const name = document.getElementById('frec-name').value.trim();
  if (!name) return;
  const id = document.getElementById('frec-id').value || 'rec_' + Date.now();
  const parentId = document.getElementById('frec-parent').value;

  const existing = allRecipes.find(r=>r.id===id);
  let img1 = existing?.img1 || '';
  let img2 = existing?.img2 || '';

  if (rec1File) {
    const r=ref(storage,`recipes/${id}_1_${Date.now()}`);
    await uploadBytes(r,rec1File); img1=await getDownloadURL(r);
  }
  if (rec2File) {
    const r=ref(storage,`recipes/${id}_2_${Date.now()}`);
    await uploadBytes(r,rec2File); img2=await getDownloadURL(r);
  }

  const data = {
    parentId,
    name: { ...(existing?.name||{}), [lang]: name },
    ingredients: { ...(existing?.ingredients||{}), [lang]: document.getElementById('frec-ing').value },
    steps: { ...(existing?.steps||{}), [lang]: document.getElementById('frec-steps').value },
    img1, img2,
    updatedAt: Date.now()
  };
  if (!existing) data.createdAt = Date.now();
  await setDoc(doc(db,'recipes',id), data, {merge:true});
  await loadAll();
  showToast(T[lang].saved);
  navTo(parentId);
};

document.getElementById('frec-cancel').onclick = () => { navTo(currentId); };

// ── DELETE ───────────────────────────────────────────────────
function confirmDeleteCat(id) {
  const t = T[lang];
  const hasChildren = allCats.some(c=>c.parentId===id) || allRecipes.some(r=>r.parentId===id);
  document.getElementById('modal-title').textContent = t.confirmDeleteCat;
  document.getElementById('modal-text').textContent = hasChildren ? t.warnHasChildren : '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick = async () => {
    document.getElementById('modal-overlay').classList.remove('open');
    await deleteCatRecursive(id);
    await loadAll();
    showToast(T[lang].deleted);
    renderLevel();
  };
}

async function deleteCatRecursive(id) {
  const childCats = allCats.filter(c=>c.parentId===id);
  for (const c of childCats) await deleteCatRecursive(c.id);
  const childRecs = allRecipes.filter(r=>r.parentId===id);
  for (const r of childRecs) await deleteDoc(doc(db,'recipes',r.id));
  await deleteDoc(doc(db,'categories',id));
}

function confirmDeleteRec(id) {
  const t = T[lang];
  document.getElementById('modal-title').textContent = t.confirmDeleteRec;
  document.getElementById('modal-text').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick = async () => {
    document.getElementById('modal-overlay').classList.remove('open');
    await deleteDoc(doc(db,'recipes',id));
    await loadAll();
    showToast(T[lang].deleted);
    navTo(currentId);
  };
}

document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('open');
};
document.getElementById('modal-overlay').onclick = e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
};

// ── SEARCH ───────────────────────────────────────────────────
document.getElementById('search-input').oninput = e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { renderLevel(); return; }

  const t = T[lang];
  document.getElementById('cats-section').innerHTML = '';
  document.getElementById('level-title').textContent = t.searchResults;

  const results = allRecipes.filter(r =>
    (r.name?.[lang]||r.name?.ru||'').toLowerCase().includes(q) ||
    (r.ingredients?.[lang]||r.ingredients?.ru||'').toLowerCase().includes(q)
  );

  const recSec = document.getElementById('recipes-section');
  recSec.innerHTML = '';
  if (!results.length) {
    recSec.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">${t.noResults}</div></div>`;
    return;
  }
  const grid = document.createElement('div'); grid.className = 'recipe-grid';
  results.forEach(r => {
    const card = makeRecipeCard(r);
    // add path hint
    const path = getPath(r.parentId);
    if (path) {
      const p = document.createElement('div'); p.className='search-path'; p.textContent=path;
      card.querySelector('.recipe-card-title').appendChild(p);
    }
    grid.appendChild(card);
  });
  recSec.appendChild(grid);
  showView('view-browse');
};

function getPath(parentId) {
  const chain = [];
  let cur = allCats.find(c=>c.id===parentId);
  while(cur) { chain.unshift(cur.name?.[lang]||cur.name?.ru||''); cur=allCats.find(c=>c.id===cur.parentId); }
  return chain.join(' › ');
}

// ── THEME / LANG ─────────────────────────────────────────────
document.getElementById('btn-theme').onclick = () => {
  theme = theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('theme',theme);
};

document.getElementById('btn-lang').onclick = () => {
  lang = lang==='ru'?'en':'ru';
  localStorage.setItem('lang',lang);
  document.getElementById('btn-lang').textContent = lang==='ru'?'EN':'RU';
  document.getElementById('search-input').placeholder = T[lang].search;
  renderLevel();
};

// ── FAB ──────────────────────────────────────────────────────
document.getElementById('fab-cat').onclick = openNewCat;
document.getElementById('fab-rec').onclick = openNewRec;

// ── HELPERS ──────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id==='view-browse') document.getElementById('fab-wrap').style.display='flex';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function showPhotoPreview(file, previewId, placeholderId) {
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById(previewId);
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById(placeholderId).style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function resetPhotoArea(inputId, previewId, placeholderId) {
  const preview = document.getElementById(previewId);
  preview.src = ''; preview.style.display = 'none';
  document.getElementById(placeholderId).style.display = 'block';
  const input = document.getElementById(inputId);
  input.value = '';
}

// expose to inline onclick
window.openEditCat = openEditCat;
window.confirmDeleteCat = confirmDeleteCat;
window.openEditRec = openEditRec;
window.confirmDeleteRec = confirmDeleteRec;
window.navTo = navTo;
</script>
